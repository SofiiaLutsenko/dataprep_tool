<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataPrep Tool — PII Masking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="container">

    <!-- Header -->
    <header class="header">
      <h1 class="logo">DataPrep <span class="logo-accent">Tool</span></h1>
      <p class="tagline">Remove personal data from your files before using AI</p>
    </header>

    <!-- Upload Card -->
    <section class="card" id="upload-card">

      <!-- Drop Zone -->
      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="dropzone-text">Drop your file here</p>
        <p class="dropzone-subtext">or</p>
        <label class="btn-secondary" for="file-input">Browse file</label>
        <input type="file" id="file-input" accept=".txt,.csv" hidden />
        <p class="dropzone-hint">.txt or .csv — max 99KB</p>
      </div>

      <!-- Selected File Info -->
      <div class="file-info hidden" id="file-info">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span id="file-name">filename.txt</span>
        <button class="btn-clear" id="btn-clear">✕</button>
      </div>

      <!-- Action Button -->
      <button class="btn-primary" id="btn-process" disabled>
        Remove personal data
      </button>

    </section>

    <!-- Status -->
    <div class="status hidden" id="status">
      <div class="status-indicator" id="status-indicator"></div>
      <span id="status-text">Processing...</span>
    </div>

    <!-- What gets masked -->
    <section class="info-panel">
      <p class="info-title">What gets removed</p>
      <ul class="info-list">
        <li class="info-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          Email addresses
        </li>
        <li class="info-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          Phone numbers
        </li>
      </ul>
      <p class="info-note">Names, addresses and dates of birth — coming in v2</p>
    </section>

    <!-- Log Panel -->
    <section class="log-panel hidden" id="log-panel">
      <p class="log-title">Cleaning log</p>
      <ul class="log-list" id="log-list"></ul>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
