[alembic]
# Path to migration scripts location
script_location = %(here)s/alembic

# Template used to generate migration filenames (prepend with date and time)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Prepend current working directory to sys.path to resolve application imports
prepend_sys_path = .

# Character used to split lists of file paths (defaults to system path separator)
path_separator = os

# Target database connection URL (Overridden dynamically in alembic/env.py via config.py)
sqlalchemy.url = postgresql+asyncpg://admin:password@127.0.0.1:5432/dataprep

[post_write_hooks]
# Automatically format and lint newly generated migration scripts using Ruff
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S